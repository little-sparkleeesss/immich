name: Zizmor

on:
  pull_request:
  push:
    branches: [main]

jobs:
  zizmor:
    if: github.repository == 'immich-app/immich'
    name: Zizmor
    uses: immich-app/devtools/.github/workflows/shared-zizmor.yml@main
    permissions:
      actions: read
      contents: read
      security-events: write
    secrets: inherit
