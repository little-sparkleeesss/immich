name: Docker

on:
  workflow_dispatch:
  push:
    branches: [develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  filter:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      server: ${{ steps.filter.outputs.server }}
      ml: ${{ steps.filter.outputs.ml }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - id: filter
        uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050 # v3
        with:
          predicate-quantifier: 'some'
          filters: |
            server:
              - 'server/**'
              - 'web/**'
              - 'i18n/**'
              - 'packages/**'
              - 'open-api/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/docker.yml'
            ml:
              - 'machine-learning/**'
              - '.github/workflows/docker.yml'

  build-server:
    name: Build Server (${{ matrix.suffix }})
    needs: filter
    if: ${{ github.event_name == 'workflow_dispatch' || needs.filter.outputs.server == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (single platform)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: server/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          tags: ghcr.io/${{ github.repository_owner }}/immich-server:develop-linux-${{ matrix.suffix }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/immich-server-build-cache:linux-${{ matrix.suffix }}
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/immich-server-build-cache:linux-${{ matrix.suffix }},mode=max,compression=zstd
          build-args: |
            BUILD_ID=${{ github.run_id }}
            BUILD_IMAGE=immich-server
            BUILD_SOURCE_REF=${{ github.ref }}
            BUILD_SOURCE_COMMIT=${{ github.sha }}
            DEVICE=cpu

  merge-server:
    name: Merge Server manifest
    needs: build-server
    if: ${{ always() && needs.build-server.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifests
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/immich-server
        run: |
          docker buildx imagetools create \
            -t "${IMAGE}:develop" \
            -t "${IMAGE}:commit-${{ github.sha }}" \
            "${IMAGE}:develop-linux-amd64" \
            "${IMAGE}:develop-linux-arm64"

  build-ml:
    name: Build ML (${{ matrix.device }} ${{ matrix.suffix }})
    needs: filter
    if: ${{ github.event_name == 'workflow_dispatch' || needs.filter.outputs.ml == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - device: cpu
            tag_suffix: ''
            platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - device: cpu
            tag_suffix: ''
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
          - device: cuda
            tag_suffix: '-cuda'
            platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - device: openvino
            tag_suffix: '-openvino'
            platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (single platform)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: machine-learning
          file: machine-learning/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          tags: ghcr.io/${{ github.repository_owner }}/immich-machine-learning:develop${{ matrix.tag_suffix }}-linux-${{ matrix.suffix }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/immich-machine-learning-build-cache:${{ matrix.device }}-linux-${{ matrix.suffix }}
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/immich-machine-learning-build-cache:${{ matrix.device }}-linux-${{ matrix.suffix }},mode=max,compression=zstd
          build-args: |
            BUILD_ID=${{ github.run_id }}
            BUILD_IMAGE=immich-machine-learning
            BUILD_SOURCE_REF=${{ github.ref }}
            BUILD_SOURCE_COMMIT=${{ github.sha }}
            DEVICE=${{ matrix.device }}

  merge-ml:
    name: Merge ML manifest (${{ matrix.device }})
    needs: build-ml
    if: ${{ always() && needs.build-ml.result == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # sources 是空格分隔的完整 per-platform tag（不含 IMAGE 前缀），由 shell 拼
          - device: cpu
            tag_suffix: ''
            sources: develop-linux-amd64 develop-linux-arm64
          - device: cuda
            tag_suffix: '-cuda'
            sources: develop-cuda-linux-amd64
          - device: openvino
            tag_suffix: '-openvino'
            sources: develop-openvino-linux-amd64
    permissions:
      contents: read
      packages: write
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifests
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/immich-machine-learning
          TAG_SUFFIX: ${{ matrix.tag_suffix }}
          SOURCES: ${{ matrix.sources }}
        run: |
          read -ra srcs <<< "$SOURCES"
          args=()
          for s in "${srcs[@]}"; do args+=("${IMAGE}:${s}"); done
          docker buildx imagetools create \
            -t "${IMAGE}:develop${TAG_SUFFIX}" \
            -t "${IMAGE}:commit-${{ github.sha }}${TAG_SUFFIX}" \
            "${args[@]}"
