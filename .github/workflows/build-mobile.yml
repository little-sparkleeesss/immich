name: Build Mobile

on:
  workflow_dispatch:
  push:
    branches: [develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  filter:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - id: filter
        uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050 # v3
        with:
          predicate-quantifier: 'some'
          filters: |
            mobile:
              - 'mobile/**'
              - 'i18n/**'
              - '.github/workflows/build-mobile.yml'

  build-android:
    name: Build Android APK
    needs: filter
    if: ${{ github.event_name == 'workflow_dispatch' || needs.filter.outputs.mobile == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Java
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: '3.44.1'
          cache: true

      - name: Cache Android SDK
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.android
          key: android-sdk-${{ runner.os }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4

      - name: Cache Gradle
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('mobile/android/**/*.gradle*', 'mobile/android/gradle.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Cache Flutter pub
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.pub-cache
            mobile/.dart_tool
          key: flutter-pub-${{ runner.os }}-${{ hashFiles('mobile/pubspec.yaml', 'mobile/pubspec.lock') }}
          restore-keys: flutter-pub-${{ runner.os }}-

      - name: Install Flutter dependencies
        working-directory: ./mobile
        run: flutter pub get

      - name: Generate platform APIs (pigeon)
        working-directory: ./mobile
        run: |
          ls pigeon/*.dart | xargs -n1 -P4 -I{} dart run pigeon --input {}
          dart format lib/platform/

      - name: Generate translations
        working-directory: ./mobile
        run: |
          dart run easy_localization:generate -S ../i18n
          dart format lib/generated/codegen_loader.g.dart
          dart run bin/generate_keys.dart
          dart format lib/generated/translations.g.dart

      - name: Build Android APK
        working-directory: ./mobile
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-apk
          path: mobile/build/app/outputs/flutter-apk/*.apk
